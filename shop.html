<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Bloom & Glow Beauty</title>
    <meta name="description" content="Browse Bloom & Glow collections with filters for skincare and makeup." />
    <meta property="og:title" content="Shop | Bloom & Glow Beauty" />
    <meta property="og:description" content="Discover skincare and makeup products tailored to your concerns." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">Bloom & Glow</a>
        <nav>
          <a href="shop.html" class="active">Shop</a>
          <a href="contact.html">Contact</a>
          <a href="cart.html">Cart (<span data-cart-count>0</span>)</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <h1>Shop Collections</h1>
      <div class="filters">
        <input id="search" placeholder="Search products, concerns, ingredients" />
        <select id="category">
          <option value="all">All categories</option>
          <option value="Skincare">Skincare</option>
          <option value="Makeup">Makeup</option>
        </select>
        <select id="sort">
          <option value="default">Sort: Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>

      <section id="shop-grid" class="products-grid"></section>
    </main>

    <footer class="main-footer">
      <p class="copyright">© <span data-year></span> Bloom & Glow Beauty</p>
    </footer>

    <script src="products.js"></script>
    <script src="app.js"></script>
  </body>
</html>
